services:
  - type: web
    name: resqbot
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./resqbot.db
      - key: MODEL_PATH
        value: combined_model.pkl
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_DOCS
        value: "false"
      - key: ENABLE_PREDICT
        value: "false"